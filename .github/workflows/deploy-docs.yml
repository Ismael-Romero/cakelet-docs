name: Deploy Cakelet Documentation

on:
  push:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  INSTANCE: "Writerside/csd"
  DOCKER_VERSION: "latest"

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      artifact: ${{ steps.ids.outputs.artifact }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute artifact name
        id: ids
        shell: bash
        run: |
          INSTANCE_ID="${INSTANCE#*/}"
          INSTANCE_UPPER=$(echo "$INSTANCE_ID" | tr '[:lower:]' '[:upper:]')
          ARTIFACT="webHelp${INSTANCE_UPPER}2-all.zip"

          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Build Writerside documentation
        uses: JetBrains/writerside-github-action@v4
        with:
          instance: ${{ env.INSTANCE }}
          docker-version: ${{ env.DOCKER_VERSION }}
          artifact: ${{ steps.ids.outputs.artifact }}

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: artifacts/*
          retention-days: 7

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: artifacts

      - name: Extract website
        run: |
          unzip -qq "artifacts/${{ needs.build.outputs.artifact }}" -d site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
